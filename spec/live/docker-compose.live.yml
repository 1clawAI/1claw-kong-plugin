version: "3.8"

services:
  httpbin:
    image: kennethreitz/httpbin
    ports:
      - "8080:80"

  kong:
    image: kong:3.9
    depends_on:
      httpbin:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PLUGINS: bundled,1claw-vault-auth
      KONG_LUA_PACKAGE_PATH: /kong-plugin/?.lua;/kong-plugin/?/init.lua;;
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system,/etc/ssl/certs/ca-certificates.crt
      KONG_LUA_SSL_VERIFY_DEPTH: "5"
      KONG_NGINX_PROXY_LUA_SSL_TRUSTED_CERTIFICATE: /etc/ssl/certs/ca-certificates.crt
      KONG_LOG_LEVEL: info
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    volumes:
      - ../../kong:/kong-plugin/kong
      - ./kong.live.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 3s
      retries: 15
